<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK | Power XI</title>
    <style>
        :root {
            --csk-yellow: #FFCB05;
            --csk-blue: #001242;
            --stadium-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--stadium-dark);
            color: white;
            overflow: hidden; /* Main scroll hidden */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            cursor: default;
        }

        /* --- BACKGROUND --- */
        #stadium-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- SMOKE --- */
        #smoke-overlay {
            position: fixed;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: radial-gradient(circle, #ffffff 0%, var(--csk-yellow) 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            pointer-events: none;
        }
        .smoke-explode { animation: smokeExpand 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes smokeExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(300); opacity: 0; }
        }

        /* --- STAGE 1: LOGO --- */
        .center-stage {
            position: relative; z-index: 50;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .logo-container {
            width: 300px; height: 300px;
            background: rgba(0, 18, 66, 0.9);
            border: 5px solid var(--csk-yellow);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 100px rgba(255, 203, 5, 0.2);
            margin-bottom: 20px;
            animation: floatGlow 4s ease-in-out infinite;
            overflow: hidden; /* Keeps logo inside */
            position: relative;
        }
        .logo-container img { 
            width: 85%; height: 85%; 
            object-fit: contain; /* Keeps aspect ratio */
            position: relative; z-index: 2; 
        }
        h1 { font-size: 3.5rem; color: white; text-transform: uppercase; animation: pulseText 1.5s infinite alternate; text-shadow: 2px 2px 0 #000; }
        .tagline { font-size: 1.5rem; color: var(--csk-yellow); letter-spacing: 5px; font-weight: bold; text-shadow: 1px 1px 0 #000; }

        /* --- STAGE 2: CARDS --- */
        #cards-stage {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 40; /* Above canvas */
            display: none; 
            flex-direction: column; 
            align-items: center;
            overflow-y: auto; /* Allow scrolling for cards */
            padding-bottom: 150px; /* Space for bottom elements */
        }

        .page-title {
            color: var(--csk-yellow); font-size: 2.5rem; text-transform: uppercase;
            margin-top: 20px; margin-bottom: 10px; 
            text-shadow: 0 0 10px var(--csk-yellow);
            text-align: center; border-bottom: 2px solid var(--csk-yellow); padding-bottom: 5px;
            width: 100%;
        }

        .section-title {
            color: white; font-size: 1.5rem; margin: 15px 0 10px 0;
            width: 100%; text-align: left; 
            border-left: 5px solid var(--csk-yellow); padding-left: 10px;
            max-width: 1200px; margin-left: auto; margin-right: auto;
        }

        .cards-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            width: 100%; max-width: 1200px;
            margin-bottom: 10px;
        }

        .player-card {
            width: 140px; height: 200px;
            background: linear-gradient(135deg, var(--csk-blue), #000);
            border: 2px solid var(--csk-yellow);
            border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 203, 5, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; /* Starts invisible */
            transform: scale(0.5);
            position: relative;
        }
        
        .player-card.impact { 
            border-color: #fff; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); 
            width: 160px; height: 220px; 
        }

        .player-img { 
            width: 80px; height: 100px; 
            object-fit: cover; 
            margin-bottom: 8px; 
            border-bottom: 1px solid var(--csk-yellow);
            background: #222; /* Fallback */
        }
        .impact .player-img { width: 100px; height: 120px; }

        .player-role { font-size: 0.6rem; color: var(--csk-yellow); text-transform: uppercase; margin-bottom: 2px; }
        .player-name { font-size: 0.8rem; text-align: center; color: white; text-transform: uppercase; line-height: 1; padding: 0 5px; }

        /* --- STAGE 3: WHISTLE --- */
        #whistle-stage {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60; /* Topmost layer */
            display: none; flex-direction: column; align-items: center; cursor: pointer;
            background: rgba(0,0,0,0.9); padding: 30px; border-radius: 50%; border: 4px solid var(--csk-yellow);
            box-shadow: 0 0 50px var(--csk-yellow);
        }
        .whistle-container { width: 120px; height: 120px; position: relative; animation: floatWhistle 2s ease-in-out infinite; }
        .whistle-body {
            width: 80px; height: 35px; background: linear-gradient(to bottom, #FFD700, #FFCB05, #B8860B);
            border-radius: 20px; position: absolute; top: 40px; left: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.5); z-index: 2;
        }
        .whistle-body::before {
            content: ''; position: absolute; width: 30px; height: 20px; background: #FFCB05;
            left: -25px; top: 8px; border-radius: 5px 0 0 5px;
        }
        .whistle-ring {
            width: 30px; height: 30px; border: 6px solid #FFCB05; border-radius: 50%;
            position: absolute; right: -10px; top: 50%; transform: translateY(-50%) rotateX(60deg); z-index: 1;
        }
        .click-hint { margin-top: 20px; color: white; font-size: 1.2rem; animation: pulseText 1s infinite; }

        /* --- STAGE 4: VIDEO --- */
        #video-stage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30; display: none; justify-content: center; align-items: center;
            perspective: 1000px; overflow: hidden; background: black;
        }
        .video-wrapper {
            width: 60vmin; height: 60vmin;
            border: 4px solid var(--csk-yellow);
            box-shadow: 0 0 50px var(--csk-yellow);
            overflow: hidden;
            z-index: 25; /* Above ring */
            position: relative; background: black;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- TROPHY RING --- */
        .trophy-ring {
            position: absolute; top: 50%; left: 50%;
            width: 85vmin; height: 85vmin;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 203, 5, 0.3);
            border-radius: 50%;
            animation: rotateRing 25s linear infinite;
            z-index: 20; /* Behind video */
            pointer-events: none;
        }
        .trophy-item {
            position: absolute; top: 50%; left: 50%;
            transform-origin: 0 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .trophy-icon { font-size: 2.5rem; filter: drop-shadow(0 0 10px gold); animation: bob 2s ease-in-out infinite; }
        .year-text {
            color: var(--csk-yellow); font-weight: bold; font-size: 1rem;
            background: var(--csk-blue); padding: 2px 6px; border-radius: 5px;
            border: 1px solid var(--csk-yellow); margin-top: 5px; white-space: nowrap;
        }

        /* --- 3D THUNDER --- */
        #thunder-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
            display: none; perspective: 1000px; overflow: hidden;
        }
        .lightning-bolt {
            position: absolute; top: 0; left: 50%; width: 100px; height: 300px;
            background: #fff;
            clip-path: polygon(50% 0%, 40% 30%, 60% 30%, 30% 60%, 70% 60%, 20% 100%, 80% 100%, 55% 65%, 75% 65%, 45% 35%, 65% 35%);
            opacity: 0;
            transform: translate(-50%, -100%) scale(2) rotate(10deg);
            filter: drop-shadow(0 0 20px #00BFFF) drop-shadow(0 0 40px #fff);
        }
        .strike .lightning-bolt { animation: zapStrike 0.3s ease-out forwards; }
        @keyframes zapStrike {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(10deg) translateZ(200px); }
            20% { opacity: 1; transform: translate(-50%, 0) scale(1.2) rotate(-5deg) translateZ(50px); }
            40% { opacity: 0.2; }
            60% { opacity: 1; transform: translate(-50%, 0) scale(1.2) rotate(5deg) translateZ(20px); }
            100% { opacity: 0; transform: translate(-50%, 50%) scale(0.8) rotate(0deg) translateZ(0); }
        }
        .screen-flash { animation: flashBg 0.2s ease-out; }
        @keyframes flashBg {
            0% { background-color: #000; }
            10% { background-color: #1a1a4a; }
            50% { background-color: #fff; }
            100% { background-color: #000; }
        }

        /* --- FLASH & POP ANIMATIONS --- */
        @keyframes flashCard {
            0% { box-shadow: 0 0 0 rgba(255, 203, 5, 0); border-color: var(--csk-yellow); }
            50% { box-shadow: 0 0 50px var(--csk-yellow); border-color: #fff; transform: scale(1.05); }
            100% { box-shadow: 0 0 10px rgba(255, 203, 5, 0.3); border-color: var(--csk-yellow); transform: scale(1); }
        }
        .flash-effect { animation: flashCard 0.5s ease-out; }

        @keyframes floatGlow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulseText { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes floatWhistle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes rotateRing { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        @media (max-width: 600px) {
            .player-card { width: 100px; height: 150px; }
            .impact { width: 110px; height: 170px; }
            .player-img { width: 60px; height: 70px; }
            .impact .player-img { width: 70px; height: 90px; }
            .player-name { font-size: 0.6rem; }
            .logo-container { width: 200px; height: 200px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- LAYERS -->
    <canvas id="stadium-canvas"></canvas>
    <div id="smoke-overlay"></div>

    <!-- STAGE 1: LOGO -->
    <div class="center-stage" id="logo-stage">
        <div class="logo-container">
            <img src="csk_custom.png" alt="CSK Logo">
        </div>
        <h1>CHENNAI<br>SUPER KINGS</h1>
        <div class="tagline">WHISTLE PODU!</div>
    </div>

    <!-- STAGE 2: CARDS -->
    <div id="cards-stage">
        <h1 class="page-title">POWER CSK FULL XI</h1>
        
        <div class="cards-grid" id="main-grid">
            <!-- Cards injected by JS -->
        </div>

        <h2 class="section-title">IMPACT SUBSTITUTES</h2>
        
        <div class="cards-grid" id="impact-grid">
            <!-- Impact cards injected by JS -->
        </div>
    </div>

    <!-- STAGE 3: WHISTLE -->
    <div id="whistle-stage" onclick="playVideo()">
        <div class="whistle-container">
            <div class="whistle-body"></div>
            <div class="whistle-ring"></div>
        </div>
        <div class="click-hint">CLICK TO START</div>
    </div>

    <!-- STAGE 4: VIDEO -->
    <div id="video-stage">
        <!-- Thunder Overlay -->
        <div id="thunder-overlay">
            <div class="lightning-bolt"></div>
        </div>

        <!-- Trophy Ring -->
        <div class="trophy-ring" id="trophy-ring-container"></div>

        <!-- Video -->
        <div class="video-wrapper">
            <video id="main-video" playsinline onended="restartAll()">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        // --- DATA ---
        const players = [
            { name: "Sanju Samson", role: "WK", img: "player1.png" },
            { name: "Ayush Mhatre", role: "BAT", img: "player2.png" },
            { name: "Ruturaj Gaikwad", role: "(C) BAT", img: "player3.png" },
            { name: "Dewald Brevis", role: "BAT", img: "player4.png" },
            { name: "Sarfaraz Khan", role: "BAT", img: "player5.png" },
            { name: "Shivam Dube", role: "AR", img: "player6.png" },
            { name: "Ramakrishna Ghosh", role: "BWL", img: "player7.png" },
            { name: "Jamie Overton", role: "AR", img: "player8.png" },
            { name: "Noor Ahmad", role: "BWL", img: "player9.png" },
            { name: "Khaleel Ahmed", role: "BWL", img: "player10.png" },
            { name: "Gurjapneet Singh", role: "BWL", img: "player11.png" }
        ];

        const impactPlayers = [
            { name: "Anshul Kamboj", role: "IMPACT", img: "impact1.png" },
            { name: "Urvil Patel", role: "IMPACT", img: "impact2.png" }
        ];

        const trophyYears = [2010, 2011, 2018, 2021, 2023];

        // --- SOUND SYSTEM (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBlip() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playThunder() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('stadium-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, spectators = [], confetti = [], time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSpectators();
        }
        window.addEventListener('resize', resize);

        class Spectator {
            constructor(angle, row) {
                this.angle = angle; this.row = row;
                this.radius = 400 + (row * 30);
                this.size = Math.random() * 6 + 4;
                const colors = ['#FFCB05', '#FFD700', '#FFA500', '#FFEC8B'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update(t) { this.currentY = Math.sin(t * 0.05 + this.angle * 5 + this.row) * 10; }
            draw() {
                const centerX = width / 2, bottomY = height + 200;
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = bottomY + Math.sin(this.angle) * this.radius + this.currentY;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Confetti {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = height + 20;
                this.vx = (Math.random() - 0.5) * 2; this.vy = -(Math.random() * 5 + 2);
                this.size = Math.random() * 8 + 2;
                this.color = Math.random() > 0.5 ? '#FFCB05' : '#001242';
            }
            update() { this.x += this.vx; this.y += this.vy; if (this.y < -20) this.reset(); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore();
            }
        }

        function initSpectators() {
            spectators = [];
            for (let r = 0; r < 20; r++) {
                for (let i = 0; i < 60; i++) {
                    spectators.push(new Spectator((Math.PI * (i/60)) + Math.random()*0.05, r));
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);
            time++;
            spectators.forEach(s => { s.update(time); s.draw(); });
            if (confetti.length < 100) confetti.push(new Confetti());
            confetti.forEach(c => { c.update(); c.draw(); });
            requestAnimationFrame(animate);
        }

        // --- LOGIC ---

        function initCards() {
            const mainGrid = document.getElementById('main-grid');
            const impactGrid = document.getElementById('impact-grid');
            
            // Render Main XI
            players.forEach((p, index) => {
                createCard(p, index, mainGrid, false);
            });

            // Render Impact Players
            impactPlayers.forEach((p, index) => {
                createCard(p, index + players.length, impactGrid, true);
            });

            // Render Trophy Ring
            const ring = document.getElementById('trophy-ring-container');
            trophyYears.forEach((year, i) => {
                const angle = (i / trophyYears.length) * 360;
                const item = document.createElement('div');
                item.className = 'trophy-item';
                item.style.transform = `rotate(${angle}deg) translate(42vmin) rotate(-${angle}deg)`;
                item.innerHTML = `<div class="trophy-icon">🏆</div><div class="year-text">${year}</div>`;
                ring.appendChild(item);
            });
        }

        function createCard(p, index, container, isImpact) {
            const div = document.createElement('div');
            div.className = isImpact ? 'player-card impact' : 'player-card';
            div.style.animationDelay = `${index * 0.1}s`; 
            
            const fallbackColor = isImpact ? '#333' : '#222';
            
            div.innerHTML = `
                <img src="${p.img}" class="player-img" onerror="this.style.display='none'; this.parentElement.style.background='${fallbackColor}'">
                <div class="player-role">${p.role}</div>
                <div class="player-name">${p.name}</div>
            `;
            container.appendChild(div);

            // Schedule Sound and Flash
            setTimeout(() => {
                playBlip();
                div.classList.add('flash-effect');
            }, index * 100);
        }

        function runSequence() {
            const logo = document.getElementById('logo-stage');
            const smoke = document.getElementById('smoke-overlay');
            const cards = document.getElementById('cards-stage');
            const whistle = document.getElementById('whistle-stage');

            // 1. Explode Smoke
            smoke.classList.add('smoke-explode');

            // 2. Switch to Cards
            setTimeout(() => {
                logo.style.display = 'none';
                cards.style.display = 'flex';
            }, 1000);

            // 3. Show Whistle
            setTimeout(() => {
                whistle.style.display = 'flex';
            }, 3500);
        }

        let thunderInterval;

        function playVideo() {
            // Resume audio context (browser requirement)
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const whistle = document.getElementById('whistle-stage');
            const cards = document.getElementById('cards-stage');
            const videoStage = document.getElementById('video-stage');
            const video = document.getElementById('main-video');
            const thunderOverlay = document.getElementById('thunder-overlay');

            whistle.style.display = 'none';
            cards.style.display = 'none';
            videoStage.style.display = 'flex';
            thunderOverlay.style.display = 'block';

            video.play();

            // Start Thunder Loop
            triggerThunder();
            thunderInterval = setInterval(triggerThunder, 3500);
        }

        function triggerThunder() {
            const thunderOverlay = document.getElementById('thunder-overlay');
            const body = document.body;

            thunderOverlay.classList.remove('strike');
            void thunderOverlay.offsetWidth; 
            thunderOverlay.classList.add('strike');

            body.classList.add('screen-flash');
            setTimeout(() => body.classList.remove('screen-flash'), 200);

            playThunder();
        }

        function restartAll() {
            clearInterval(thunderInterval);
            location.reload();
        }

        // --- INIT ---
        window.onload = () => {
            resize();
            animate();
            initCards();
            setTimeout(runSequence, 4000);
        };
    </script>
</body>
</html>
