<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK | Live Scorecard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --csk-yellow: #FFCB05;
            --csk-blue: #001242;
            --stadium-dark: #050505;
            --stat-green: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--stadium-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            cursor: default;
        }

        /* --- BACKGROUND --- */
        #stadium-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- SMOKE --- */
        #smoke-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #ffffff 0%, var(--csk-yellow) 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            pointer-events: none;
        }

        .smoke-explode {
            animation: smokeExpand 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes smokeExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(300); opacity: 0; }
        }

        /* --- STAGE 1: LOGO --- */
        .center-stage {
            position: relative;
            z-index: 50;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 300px;
            height: 300px;
            background: rgba(0, 18, 66, 0.9);
            border: 5px solid var(--csk-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(255, 203, 5, 0.2);
            margin-bottom: 20px;
            animation: floatGlow 4s ease-in-out infinite;
            overflow: hidden; 
        }

        .logo-container img { width: 100%; height: 100%; object-fit: contain; padding: 30px; }
        h1 { font-size: 3.5rem; color: white; text-transform: uppercase; animation: pulseText 1.5s infinite alternate; text-shadow: 2px 2px 0 #000; }
        .tagline { font-size: 1.5rem; color: var(--csk-yellow); letter-spacing: 5px; font-weight: bold; text-shadow: 1px 1px 0 #000; }

        /* --- STAGE 2: CARDS GRID --- */
        #cards-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 40;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
        }

        .player-card {
            width: 140px;
            height: 200px;
            background: linear-gradient(135deg, var(--csk-blue), #000);
            border: 2px solid var(--csk-yellow);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255, 203, 5, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; 
            position: relative;
        }

        .player-card.impact { border-color: #fff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.5); }

        .player-img { width: 80px; height: 100px; object-fit: cover; margin-bottom: 8px; border-bottom: 1px solid var(--csk-yellow); }
        .player-role { font-size: 0.6rem; color: var(--csk-yellow); text-transform: uppercase; margin-bottom: 2px; }
        .player-name { font-size: 0.8rem; text-align: center; color: white; text-transform: uppercase; line-height: 1; padding: 0 5px; }

        /* --- STAGE 3: WHISTLE --- */
        #whistle-stage {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
            display: none;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #whistle-stage:active { transform: translate(-50%, -50%) scale(0.95); }

        .whistle-container {
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            animation: floatWhistle 2s ease-in-out infinite;
        }

        .whistle-body {
            width: 80px; height: 35px;
            background: linear-gradient(to bottom, #FFD700, #FFCB05, #B8860B);
            border-radius: 20px;
            position: absolute;
            top: 40px; left: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.5);
            z-index: 2;
        }
        .whistle-body::before {
            content: ''; position: absolute;
            width: 30px; height: 20px;
            background: #FFCB05;
            left: -25px; top: 8px;
            border-radius: 5px 0 0 5px;
            box-shadow: inset -5px 0 5px rgba(0,0,0,0.2);
        }
        .whistle-ring {
            width: 30px; height: 30px;
            border: 6px solid #FFCB05;
            border-radius: 50%;
            position: absolute;
            right: -10px; top: 50%;
            transform: translateY(-50%) rotateX(60deg);
            z-index: 1;
            box-shadow: 0 5px 5px rgba(0,0,0,0.5);
        }

        .click-hint { margin-top: 20px; color: white; font-size: 1.2rem; animation: pulseText 1s infinite; }

        /* --- STAGE 4: VIDEO (UPDATED LAYOUT WITH STATS) --- */
        #video-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 30;
            display: none;
            flex-direction: column; 
            align-items: center;
            background: black;
            overflow: hidden;
            padding-top: 20px;
        }

        .comeback-title {
            font-size: 2.5rem;
            color: var(--csk-yellow);
            z-index: 50;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--csk-blue), 0 0 20px var(--csk-yellow);
            letter-spacing: 5px;
            animation: titlePopIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, titleGlitch 2s infinite;
        }

        .video-layout-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex: 1; 
            gap: 15px;
            padding: 0 10px;
            z-index: 20;
        }

        /* UPDATED: Side Panels with Stats */
        .side-panel {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Cards per line */
            grid-auto-rows: 130px; /* Taller to fit stats */
            gap: 8px;
            height: 100%;
            width: 260px; /* Wider to accommodate text */
            align-content: center;
            justify-items: center;
            overflow-y: auto; /* Scroll if too many players */
            padding: 5px;
        }

        /* Scrollbar styling */
        .side-panel::-webkit-scrollbar { width: 5px; }
        .side-panel::-webkit-scrollbar-track { background: #001; }
        .side-panel::-webkit-scrollbar-thumb { background: var(--csk-yellow); border-radius: 3px; }

        /* UPDATED: Stats Card */
        .mini-card {
            width: 100%;
            height: 100%;
            background: rgba(0, 18, 66, 0.9);
            border: 1px solid var(--csk-yellow);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px;
            position: relative;
            transition: all 0.3s;
            animation: slideInSide 0.5s ease-out forwards;
            opacity: 0;
        }

        /* Best Player Highlight */
        .mini-card.best-player {
            border: 2px solid #fff;
            box-shadow: 0 0 15px var(--csk-yellow);
            background: linear-gradient(135deg, rgba(255,203,5,0.2), #000);
            z-index: 10;
        }
        
        .best-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: red;
            color: white;
            font-size: 0.5rem;
            padding: 2px 5px;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 2px 5px black;
            z-index: 15;
        }

        .mini-card:hover { transform: scale(1.05); }

        .mc-header {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }

        .mc-img { width: 25px; height: 30px; object-fit: cover; border-radius: 3px; margin-right: 5px; }
        .mc-name { font-size: 0.55rem; font-weight: bold; color: white; text-align: left; line-height: 1.1; flex: 1; }
        .mc-role { font-size: 0.4rem; color: var(--csk-yellow); display: block; text-align: right; }

        .mc-stats {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 2px;
            border-radius: 3px;
        }

        .stat-label { font-size: 0.3rem; color: #aaa; text-transform: uppercase; }
        .stat-val { font-size: 0.55rem; font-weight: bold; color: var(--csk-yellow); }
        
        /* Live update animation */
        .stat-val.updating { color: var(--stat-green); animation: flash 0.5s; }

        /* Bigger Video Wrapper */
        .video-wrapper {
            width: 55vmin;  /* Slightly smaller to fit wider panels */
            height: 60vmin;
            border: 4px solid var(--csk-yellow);
            box-shadow: 0 0 50px var(--csk-yellow);
            overflow: hidden;
            z-index: 10;
            border-radius: 10px;
            animation: videoPulse 2s ease-in-out infinite; 
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Vibing Background */
        .vibe-bg {
            position: absolute;
            top: 50%; left: 50%;
            width: 150vmax; height: 150vmax;
            transform: translate(-50%, -50%);
            background: conic-gradient(from 0deg, transparent 0%, var(--csk-blue) 20%, var(--csk-yellow) 40%, transparent 60%, var(--csk-blue) 80%, transparent 100%);
            opacity: 0.3;
            animation: vibeSpin 10s linear infinite;
            z-index: 0;
            filter: blur(20px);
        }
        
        .vibe-particles {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 1;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px);
            background-size: 550px 550px;
            animation: particleMove 60s linear infinite;
        }

        /* Trophy Ticker */
        .trophy-bar-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 18, 66, 0.9);
            border-top: 2px solid var(--csk-yellow);
            z-index: 50;
            display: flex;
            align-items: center;
            overflow: hidden;
            backdrop-filter: blur(5px);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .trophy-track {
            display: flex;
            align-items: center;
            gap: 80px;
            animation: slideLeft 20s linear infinite;
            padding-left: 50px;
        }

        .trophy-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            color: white;
            white-space: nowrap;
        }

        .trophy-icon {
            color: var(--csk-yellow);
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px var(--csk-yellow));
        }

        .trophy-year { font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* --- ANIMATIONS --- */
        @keyframes floatGlow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulseText { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes floatWhistle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        @keyframes vibeSpin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes particleMove { from { background-position: 0 0; } to { background-position: 550px 550px; } }
        @keyframes videoPulse { 0%, 100% { box-shadow: 0 0 30px var(--csk-yellow); } 50% { box-shadow: 0 0 80px var(--csk-yellow), 0 0 20px white; } }
        @keyframes slideLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        @keyframes titlePopIn { from { opacity: 0; transform: scale(2); } to { opacity: 1; transform: scale(1); } }
        @keyframes titleGlitch { 
            0% { text-shadow: 2px 0 var(--csk-blue), -2px 0 var(--csk-yellow); }
            5% { text-shadow: -2px 0 var(--csk-blue), 2px 0 var(--csk-yellow); }
            100% { text-shadow: 2px 0 var(--csk-blue), -2px 0 var(--csk-yellow); }
        }
        @keyframes slideInSide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes flash { 0% { color: #fff; } 100% { color: var(--stat-green); } }

        /* Mobile Adjustments */
        @media (max-width: 1000px) {
            .side-panel { display: none; } /* Hide stats on mobile */
            .video-wrapper { width: 90vw; height: 50vh; }
            .comeback-title { font-size: 1.5rem; margin-bottom: 50px; }
        }
    </style>
</head>
<body>

    <canvas id="stadium-canvas"></canvas>
    <div id="smoke-overlay"></div>

    <!-- STAGE 1: LOGO -->
    <div class="center-stage" id="logo-stage">
        <div class="logo-container">
            <img src="csk_custom.png" alt="CSK Logo" onerror="this.style.display='none'">
        </div>
        <h1>CHENNAI<br>SUPER KINGS</h1>
        <div class="tagline">WHISTLE PODU!</div>
    </div>

    <!-- STAGE 2: ALL CARDS GRID -->
    <div id="cards-stage">
        <div class="cards-grid" id="grid-container"></div>
    </div>

    <!-- STAGE 3: WHISTLE INTERACTION -->
    <div id="whistle-stage">
        <div class="whistle-container">
            <div class="whistle-body"></div>
            <div class="whistle-ring"></div>
        </div>
        <div class="click-hint">CLICK TO START</div>
    </div>

    <!-- STAGE 4: VIDEO & LIVE STATS -->
    <div id="video-stage">
        <div class="vibe-bg"></div>
        <div class="vibe-particles"></div>

        <div class="comeback-title">LIVE SCORECARD</div>

        <div class="video-layout-row">
            <!-- Left Side: Stats -->
            <div class="side-panel" id="side-left"></div>

            <!-- Center: Video -->
            <div class="video-wrapper">
                <video id="main-video" playsinline onended="restartAll()">
                    <source src="video.mp4" type="video/mp4">
                </video>
            </div>

            <!-- Right Side: Stats -->
            <div class="side-panel" id="side-right"></div>
        </div>

        <!-- Trophy Ticker -->
        <div class="trophy-bar-container">
            <div class="trophy-track">
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2010</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2011</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2018</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2021</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2023</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2024</span></div>
                <!-- Duplicate -->
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2010</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2011</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2018</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2021</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2023</span></div>
                <div class="trophy-item"><i class="fas fa-trophy trophy-icon"></i> <span class="trophy-year">CHAMPIONS 2024</span></div>
            </div>
        </div>
    </div>

    <script>
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const SoundFX = {
            playWhistle: function() {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const t = audioCtx.currentTime;
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(2000, t);
                oscillator.frequency.linearRampToValueAtTime(2300, t + 0.1);
                oscillator.frequency.linearRampToValueAtTime(2200, t + 0.3);
                gainNode.gain.setValueAtTime(0, t);
                gainNode.gain.linearRampToValueAtTime(0.5, t + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start(t);
                oscillator.stop(t + 1.5);
            },
            playCardAssembly: function() {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const t = audioCtx.currentTime;
                const bufferSize = audioCtx.sampleRate * 1.5; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, t);
                filter.frequency.linearRampToValueAtTime(100, t + 1.0);
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.5, t);
                gainNode.gain.exponentialRampToValueAtTime(0.01, t + 1.0);
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                noise.start(t);
            }
        };

        // --- DATA WITH STATS (Simulated) ---
        // Note: In a real app, these values would be fetched from an API
        const players = [
            { name: "Sanju Samson", role: "WK", img: "player1.png", stats: { runs: 45, best: 45, fifties: 0, hundreds: 0, wickets: 0, dots: 2, economy: 0 } },
            { name: "Ayush Mhatre", role: "BAT", img: "player2.png", stats: { runs: 12, best: 12, fifties: 0, hundreds: 0, wickets: 0, dots: 0, economy: 0 } },
            { name: "Ruturaj Gaikwad", role: "(C) BAT", img: "player3.png", stats: { runs: 98, best: 98, fifties: 1, hundreds: 0, wickets: 0, dots: 5, economy: 0 } },
            { name: "Dewald Brevis", role: "BAT", img: "player4.png", stats: { runs: 30, best: 30, fifties: 0, hundreds: 0, wickets: 0, dots: 3, economy: 0 } },
            { name: "Sarfaraz Khan", role: "BAT", img: "player5.png", stats: { runs: 55, best: 55, fifties: 1, hundreds: 0, wickets: 0, dots: 4, economy: 0 } },
            { name: "Shivam Dube", role: "AR", img: "player6.png", stats: { runs: 22, best: 22, fifties: 0, hundreds: 0, wickets: 1, dots: 10, economy: 8.5 } },
            { name: "Ramakrishna Ghosh", role: "BWL", img: "player7.png", stats: { runs: 0, best: 0, fifties: 0, hundreds: 0, wickets: 2, dots: 15, economy: 7.2 } },
            { name: "Jamie Overton", role: "AR", img: "player8.png", stats: { runs: 10, best: 10, fifties: 0, hundreds: 0, wickets: 3, dots: 8, economy: 9.0 } },
            { name: "Noor Ahmad", role: "BWL", img: "player9.png", stats: { runs: 0, best: 0, fifties: 0, hundreds: 0, wickets: 1, dots: 12, economy: 6.5 } },
            { name: "Khaleel Ahmed", role: "BWL", img: "player10.png", stats: { runs: 0, best: 0, fifties: 0, hundreds: 0, wickets: 2, dots: 18, economy: 7.8 } },
            { name: "Gurjapneet Singh", role: "BWL", img: "player11.png", stats: { runs: 0, best: 0, fifties: 0, hundreds: 0, wickets: 1, dots: 10, economy: 8.1 } }
        ];

        const impactPlayers = [
            { name: "Anshul Kamboj", role: "IMPACT", img: "impact1.png", stats: { runs: 0, best: 0, fifties: 0, hundreds: 0, wickets: 0, dots: 0, economy: 0 } },
            { name: "Urvil Patel", role: "IMPACT", img: "impact2.png", stats: { runs: 0, best: 0, fifties: 0, hundreds: 0, wickets: 0, dots: 0, economy: 0 } }
        ];

        // --- BACKGROUND ANIMATION (Canvas) ---
        const canvas = document.getElementById('stadium-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, spectators = [], confetti = [], time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSpectators();
        }
        window.addEventListener('resize', resize);

        class Spectator {
            constructor(angle, row) {
                this.angle = angle; this.row = row;
                this.radius = 400 + (row * 30);
                this.size = Math.random() * 6 + 4;
                const colors = ['#FFCB05', '#FFD700', '#FFA500', '#FFEC8B'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update(t) { this.currentY = Math.sin(t * 0.05 + this.angle * 5 + this.row) * 10; }
            draw() {
                const centerX = width / 2, bottomY = height + 200;
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = bottomY + Math.sin(this.angle) * this.radius + this.currentY;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Confetti {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = height + 20;
                this.vx = (Math.random() - 0.5) * 2; this.vy = -(Math.random() * 5 + 2);
                this.size = Math.random() * 8 + 2;
                this.color = Math.random() > 0.5 ? '#FFCB05' : '#001242';
            }
            update() { this.x += this.vx; this.y += this.vy; if (this.y < -20) this.reset(); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore();
            }
        }

        function initSpectators() {
            spectators = [];
            for (let r = 0; r < 20; r++) {
                for (let i = 0; i < 60; i++) {
                    spectators.push(new Spectator((Math.PI * (i/60)) + Math.random()*0.05, r));
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);
            time++;
            spectators.forEach(s => { s.update(time); s.draw(); });
            if (confetti.length < 100) confetti.push(new Confetti());
            confetti.forEach(c => { c.update(); c.draw(); });
            requestAnimationFrame(animate);
        }

        // --- LOGIC ---

        function initCards() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = ''; 
            let allPlayers = [...players, ...impactPlayers];
            
            allPlayers.forEach((p, index) => {
                const div = document.createElement('div');
                const isImpact = index >= players.length;
                div.className = isImpact ? 'player-card impact' : 'player-card';
                div.style.animationDelay = `${index * 0.1}s`; 
                div.innerHTML = `
                    <img src="${p.img}" class="player-img" onerror="this.src='https://via.placeholder.com/100?text=IMG'">
                    <div class="player-role">${p.role}</div>
                    <div class="player-name">${p.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        // NEW: Render Stats Side Panels
        function renderSideCards() {
            const leftContainer = document.getElementById('side-left');
            const rightContainer = document.getElementById('side-right');
            leftContainer.innerHTML = '';
            rightContainer.innerHTML = '';

            const allPlayers = [...players, ...impactPlayers];
            const midPoint = Math.ceil(allPlayers.length / 2);

            const leftPlayers = allPlayers.slice(0, midPoint);
            const rightPlayers = allPlayers.slice(midPoint);

            // Identify Best Player (Highest Runs or Wickets)
            let bestPlayer = null;
            let maxPerformance = -1;

            allPlayers.forEach(p => {
                const score = p.stats.runs + (p.stats.wickets * 20); // Simple algorithm: 1 Wicket = 20 Runs
                if (score > maxPerformance) {
                    maxPerformance = score;
                    bestPlayer = p.name;
                }
            });

            const createStatCard = (p, index) => {
                const div = document.createElement('div');
                const isBest = p.name === bestPlayer;
                div.className = isBest ? 'mini-card best-player' : 'mini-card';
                div.id = `stat-card-${p.name.replace(/\s+/g, '')}`; // ID for live updates
                div.style.animationDelay = `${index * 0.05}s}`;

                // Determine which stats to show based on role
                let statsHTML = '';
                if (p.role.includes('BAT') || p.role.includes('WK') || p.role.includes('C')) {
                    statsHTML = `
                        <div class="stat-item"><span class="stat-label">RUNS</span><span class="stat-val" id="run-${p.name.replace(/\s+/g, '')}">${p.stats.runs}</span></div>
                        <div class="stat-item"><span class="stat-label">BEST</span><span class="stat-val">${p.stats.best}</span></div>
                        <div class="stat-item"><span class="stat-label">50s</span><span class="stat-val">${p.stats.fifties}</span></div>
                        <div class="stat-item"><span class="stat-label">100s</span><span class="stat-val">${p.stats.hundreds}</span></div>
                    `;
                } else if (p.role.includes('BWL') || p.role.includes('AR')) {
                    statsHTML = `
                        <div class="stat-item"><span class="stat-label">WKT</span><span class="stat-val" id="wkt-${p.name.replace(/\s+/g, '')}">${p.stats.wickets}</span></div>
                        <div class="stat-item"><span class="stat-label">ECO</span><span class="stat-val">${p.stats.economy}</span></div>
                        <div class="stat-item"><span class="stat-label">DOTS</span><span class="stat-val" id="dot-${p.name.replace(/\s+/g, '')}">${p.stats.dots}</span></div>
                        <div class="stat-item"><span class="stat-label">RUNS</span><span class="stat-val">${p.stats.runs}</span></div>
                    `;
                } else {
                    // Impact Player
                    statsHTML = `<div class="stat-item" style="grid-column: span 2"><span class="stat-label">STATUS</span><span class="stat-val">SUB</span></div>`;
                }

                const bestBadge = isBest ? `<div class="best-badge">BEST</div>` : '';

                div.innerHTML = `
                    ${bestBadge}
                    <div class="mc-header">
                        <img src="${p.img}" class="mc-img" onerror="this.src='https://via.placeholder.com/30?text=IMG'">
                        <div>
                            <div class="mc-name">${p.name}</div>
                            <span class="mc-role">${p.role}</span>
                        </div>
                    </div>
                    <div class="mc-stats">
                        ${statsHTML}
                    </div>
                `;
                return div;
            };

            leftPlayers.forEach((p, i) => leftContainer.appendChild(createStatCard(p, i)));
            rightPlayers.forEach((p, i) => rightContainer.appendChild(createStatCard(p, i)));
        }

        // NEW: Simulate Live Data Updates
        function simulateLiveUpdates() {
            // Every 2 seconds, update a random stat
            setInterval(() => {
                const allPlayers = [...players, ...impactPlayers];
                // Pick a random batter to score runs
                const randomPlayer = allPlayers[Math.floor(Math.random() * allPlayers.length)];
                const safeName = randomPlayer.name.replace(/\s+/g, '');

                // 30% chance to update Wickets (if bowler)
                if ((randomPlayer.role.includes('BWL') || randomPlayer.role.includes('AR')) && Math.random() > 0.7) {
                    const wktEl = document.getElementById(`wkt-${safeName}`);
                    if (wktEl) {
                        let current = parseInt(wktEl.innerText);
                        wktEl.innerText = current + 1;
                        wktEl.classList.add('updating');
                        setTimeout(() => wktEl.classList.remove('updating'), 500);
                    }
                } 
                // Otherwise update Runs or Dots
                else {
                    const runEl = document.getElementById(`run-${safeName}`);
                    if (runEl) {
                        // Add 1, 2, 4, or 6
                        const runs = [0,1,1,2,4,6][Math.floor(Math.random()*6)];
                        if (runs > 0) {
                            let current = parseInt(runEl.innerText);
                            runEl.innerText = current + runs;
                            runEl.classList.add('updating');
                            setTimeout(() => runEl.classList.remove('updating'), 500);
                        }
                    } else {
                        const dotEl = document.getElementById(`dot-${safeName}`);
                        if(dotEl) {
                            let current = parseInt(dotEl.innerText);
                            dotEl.innerText = current + 1;
                        }
                    }
                }

            }, 2000);
        }

        function runSequence() {
            const logo = document.getElementById('logo-stage');
            const smoke = document.getElementById('smoke-overlay');
            const cards = document.getElementById('cards-stage');
            const whistle = document.getElementById('whistle-stage');

            smoke.classList.add('smoke-explode');

            setTimeout(() => {
                logo.style.display = 'none';
                cards.style.display = 'flex';
                SoundFX.playCardAssembly();
            }, 1000);

            setTimeout(() => {
                whistle.style.display = 'flex';
            }, 4000);
        }

        function playVideo() {
            const whistle = document.getElementById('whistle-stage');
            const cards = document.getElementById('cards-stage');
            const videoStage = document.getElementById('video-stage');
            const video = document.getElementById('main-video');

            SoundFX.playWhistle();

            setTimeout(() => {
                whistle.style.display = 'none';
                cards.style.display = 'none';

                renderSideCards();
                simulateLiveUpdates(); // Start the simulation

                videoStage.style.display = 'flex';
                video.play().catch(e => console.log("Video play failed:", e));
            }, 500);
        }

        function restartAll() {
            location.reload();
        }

        // --- INIT ---
        window.onload = () => {
            resize();
            animate();
            initCards();
            document.getElementById('whistle-stage').addEventListener('click', playVideo);
            setTimeout(runSequence, 4000);
        };
    </script>
</body>
</html>
