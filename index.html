<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK | Champions Video</title>
    <style>
        :root {
            --csk-yellow: #FFCB05;
            --csk-blue: #001242;
            --stadium-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--stadium-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            cursor: pointer; /* Indicates clickable */
        }

        /* --- STADIUM CANVAS (Background) --- */
        #stadium-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 2s ease;
        }

        /* --- SMOKE OVERLAY (Transition Effect) --- */
        #smoke-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #ffffff 0%, var(--csk-yellow) 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            pointer-events: none;
        }

        .smoke-explode {
            animation: smokeExpand 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes smokeExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(300); opacity: 1; } 
        }

        /* --- STAGE 1: LOGO & TEXT --- */
        .center-stage {
            position: relative;
            z-index: 10;
            text-align: center;
            transition: opacity 1s ease;
        }

        .logo-container {
            width: 300px;
            height: 300px;
            background: rgba(0, 18, 66, 0.9);
            border: 5px solid var(--csk-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(255, 203, 5, 0.2);
            margin: 0 auto 20px auto;
            position: relative;
            overflow: hidden;
            animation: floatGlow 4s ease-in-out infinite;
        }

        .logo-container img { width: 85%; height: 85%; object-fit: contain; z-index: 2; }
        
        .fallback-msg { display: none; color: var(--csk-yellow); font-size: 1.2rem; text-align: center; }
        
        /* Click prompt for user */
        .click-hint {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            animation: pulseText 1s infinite alternate;
            pointer-events: none;
        }

        h1 { font-size: 3.5rem; color: white; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; animation: pulseText 1.5s infinite alternate; }
        .tagline { font-size: 1.5rem; color: var(--csk-yellow); letter-spacing: 5px; font-weight: bold; }

        /* --- STAGE 2: VIDEO & TROPHY RING --- */
        #video-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Hidden initially */
            z-index: 20;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* THE BIG VIDEO FRAME */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vmin;
            height: 60vmin;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--csk-yellow);
            box-shadow: 0 0 50px var(--csk-yellow);
            z-index: 25;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Error message style */
        .video-error-msg {
            color: red;
            font-size: 1.5rem;
            text-align: center;
            display: none; /* Hidden by default */
            padding: 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
        }

        /* THE ROTATING TROPHY RING */
        .trophy-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85vmin;
            height: 85vmin;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 203, 5, 0.3);
            border-radius: 50%;
            animation: rotateRing 20s linear infinite;
            z-index: 20;
            pointer-events: none;
        }

        .trophy-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .trophy-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px gold);
            animation: bob 2s ease-in-out infinite;
        }

        .year-text {
            color: var(--csk-yellow);
            font-weight: bold;
            font-size: 1.2rem;
            background: var(--csk-blue);
            padding: 2px 8px;
            border-radius: 5px;
            border: 1px solid var(--csk-yellow);
            margin-top: 5px;
        }

        /* --- ANIMATIONS --- */
        @keyframes rotateRing { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes floatGlow { 0%, 100% { transform: translateY(0); box-shadow: 0 0 50px rgba(255, 203, 5, 0.2); } 50% { transform: translateY(-10px); box-shadow: 0 0 80px rgba(255, 203, 5, 0.5); } }
        @keyframes pulseText { from { transform: scale(1); text-shadow: 0 0 10px white; } to { transform: scale(1.05); text-shadow: 0 0 30px var(--csk-yellow); } }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        @media (max-width: 600px) {
            .logo-container { width: 220px; height: 220px; }
            h1 { font-size: 2rem; }
            .video-wrapper { width: 80vmin; height: 80vmin; }
            .trophy-ring { width: 95vmin; height: 95vmin; }
        }
    </style>
</head>
<body>

    <canvas id="stadium-canvas"></canvas>
    <div id="smoke-overlay"></div>

    <div class="center-stage" id="logo-stage">
        <div class="logo-container">
            <img src="csk_custom.png" alt="CSK Logo" onerror="this.style.display='none'; document.querySelector('.fallback-msg').style.display='block'">
            <div class="fallback-msg">SAVE IMAGE AS<br>'csk_custom.png'</div>
        </div>
        <h1>CHENNAI<br>SUPER KINGS</h1>
        <div class="tagline">WHISTLE PODU!</div>
        
        <!-- Added hint -->
        <div class="click-hint" id="start-hint" style="display:none;">(Click anywhere if video doesn't start)</div>
    </div>

    <div id="video-stage">
        <div class="trophy-ring" id="trophy-ring-container"></div>
        
        <div class="video-wrapper">
            <video id="main-video" playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
            <!-- Visible if file is missing -->
            <div id="error-display" class="video-error-msg">
                ERROR:<br>video.mp4 not found!<br>Check file name/extension.
            </div>
        </div>
    </div>

    <script>
        const TRANSITION_DELAY = 5000; 

        // --- STADIUM ANIMATION ---
        const canvas = document.getElementById('stadium-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, spectators = [], confetti = [], time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSpectators();
        }
        window.addEventListener('resize', resize);

        class Spectator {
            constructor(angle, row) {
                this.angle = angle;
                this.row = row;
                this.radius = 400 + (row * 30);
                this.size = Math.random() * 6 + 4;
                this.offset = Math.random() * 100;
                const colors = ['#FFCB05', '#FFD700', '#FFA500', '#FFEC8B'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update(t) {
                const wave = Math.sin(t * 0.05 + this.angle * 5 + this.row);
                this.currentY = wave * 10;
            }
            draw() {
                const centerX = width / 2;
                const bottomY = height + 200;
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = bottomY + Math.sin(this.angle) * this.radius + this.currentY;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Confetti {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = height + 20;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -(Math.random() * 5 + 2);
                this.size = Math.random() * 8 + 2;
                this.color = Math.random() > 0.5 ? '#FFCB05' : '#001242';
                this.rotation = Math.random() * 360;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += 2;
                if (this.y < -20) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function initSpectators() {
            spectators = [];
            const rows = 20, peoplePerRow = 60;
            for (let r = 0; r < rows; r++) {
                for (let i = 0; i < peoplePerRow; i++) {
                    const angle = (Math.PI * (i / peoplePerRow)) + (Math.random() * 0.05);
                    spectators.push(new Spectator(angle, r));
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            if(document.getElementById('video-stage').style.display === 'block') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; 
            } else {
                const gradient = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width);
                gradient.addColorStop(0, '#1a1a1a');
                gradient.addColorStop(1, '#000000');
                ctx.fillStyle = gradient;
            }
            ctx.fillRect(0, 0, width, height);

            time++;
            spectators.forEach(s => { s.update(time); s.draw(); });
            if (confetti.length < 100) confetti.push(new Confetti());
            for (let i = confetti.length - 1; i >= 0; i--) {
                let c = confetti[i];
                c.update();
                c.draw();
            }
            requestAnimationFrame(animate);
        }

        // --- TROPHY RING ---
        const years = [2010, 2011, 2018, 2021, 2023];
        const ringContainer = document.getElementById('trophy-ring-container');
        years.forEach((year, index) => {
            const angle = (index / years.length) * 360;
            const item = document.createElement('div');
            item.className = 'trophy-item';
            item.style.transform = `rotate(${angle}deg) translate(42vmin) rotate(-${angle}deg)`; 
            item.innerHTML = `<div class="trophy-icon">🏆</div><div class="year-text">${year}</div>`;
            ringContainer.appendChild(item);
        });

        // --- MAIN LOGIC ---
        let hasStarted = false;

        function startVideoSequence() {
            if(hasStarted) return;
            hasStarted = true;

            const smoke = document.getElementById('smoke-overlay');
            const logoStage = document.getElementById('logo-stage');
            const videoStage = document.getElementById('video-stage');
            const video = document.getElementById('main-video');

            // 1. Explode Smoke
            smoke.classList.add('smoke-explode');

            // 2. Switch content halfway through
            setTimeout(() => {
                logoStage.style.display = 'none';
                videoStage.style.display = 'block';
                
                // Attempt Play
                video.muted = true; // Ensure muted
                video.play().then(() => {
                    console.log("Video started automatically");
                }).catch(e => {
                    console.log("Autoplay blocked, waiting for click");
                    document.getElementById('start-hint').style.display = 'block';
                });
            }, 750);

            // 3. Fade out smoke
            setTimeout(() => {
                smoke.style.opacity = '0';
                smoke.style.transition = 'opacity 1s ease';
            }, 1400);
        }

        // Handle Video Errors
        document.getElementById('main-video').addEventListener('error', function() {
            console.error("Video file not found");
            document.getElementById('error-display').style.display = 'block';
        });

        // Initialize
        window.onload = () => {
            resize();
            animate();
            
            // Auto start after delay
            setTimeout(startVideoSequence, TRANSITION_DELAY);

            // CLICK ANYWHERE TO FORCE START (Fix for Autoplay policies)
            document.body.addEventListener('click', () => {
                const video = document.getElementById('main-video');
                if(video.paused) {
                    document.getElementById('start-hint').style.display = 'none';
                    // If we haven't switched stages yet, do it immediately
                    if(!hasStarted) {
                        clearTimeout(window.autoStartTimer); // Clear the auto timer if exists
                        startVideoSequence();
                    }
                    video.muted = false; // Unmute on click
                    video.play();
                }
            });
        };
    </script>
</body>
</html>
