<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK | Playing XI</title>
    <style>
        :root {
            --csk-yellow: #FFCB05;
            --csk-blue: #001242;
            --stadium-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--stadium-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            cursor: pointer;
        }

        /* --- BACKGROUND (Layer 1) --- */
        #stadium-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Bottom layer */
        }

        /* --- SMOKE OVERLAY (Layer 100) --- */
        #smoke-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #ffffff 0%, var(--csk-yellow) 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            pointer-events: none;
        }

        .smoke-explode {
            animation: smokeExpand 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes smokeExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(300); opacity: 0; }
        }

        /* --- STAGE 1: LOGO (Layer 50 - Top) --- */
        .center-stage {
            position: relative;
            z-index: 50; /* FORCED TO TOP */
            text-align: center;
            transition: opacity 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 300px;
            height: 300px;
            background: rgba(0, 18, 66, 0.9); /* Dark blue backup */
            border: 5px solid var(--csk-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(255, 203, 5, 0.2);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            animation: floatGlow 4s ease-in-out infinite;
        }
        .logo-container img { width: 85%; height: 85%; object-fit: contain; }
        
        h1 { font-size: 3.5rem; color: white; text-transform: uppercase; letter-spacing: 2px; animation: pulseText 1.5s infinite alternate; text-shadow: 2px 2px 0 #000; }
        .tagline { font-size: 1.5rem; color: var(--csk-yellow); letter-spacing: 5px; font-weight: bold; text-shadow: 1px 1px 0 #000; }

        /* --- STAGE 2: PLAYER CARDS (Layer 40) --- */
        #card-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            z-index: 40;
            display: none;
            perspective: 1000px;
        }

        .player-card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 420px;
            background: linear-gradient(135deg, var(--csk-blue), #000);
            border: 4px solid var(--csk-yellow);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 203, 5, 0.4);
            transform: translate(-50%, -50%) translateX(-150vw); 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }

        .player-card.active { transform: translate(-50%, -50%) translateX(0); }
        .player-card.exit { transform: translate(-50%, -50%) translateX(150vw); }

        .player-img {
            width: 200px;
            height: 250px;
            object-fit: cover;
            border-bottom: 2px solid var(--csk-yellow);
            margin-bottom: 15px;
            background: #222; /* Placeholder color */
        }

        .player-role { color: var(--csk-yellow); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .player-name { font-size: 1.8rem; text-align: center; color: white; text-transform: uppercase; line-height: 1.1; }
        .impact-badge { position: absolute; top: 10px; right: 10px; background: var(--csk-yellow); color: var(--csk-blue); padding: 5px 10px; font-size: 0.8rem; font-weight: bold; border-radius: 5px; }

        /* --- STAGE 3: VIDEO (Layer 30) --- */
        #video-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 30;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vmin;
            height: 60vmin;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--csk-yellow);
            box-shadow: 0 0 50px var(--csk-yellow);
            z-index: 25;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        .sound-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; background: rgba(0,0,0,0.5); border-radius: 50%; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; font-size: 40px; pointer-events: none; transition: opacity 0.5s; }
        .video-error-msg { color: red; font-size: 1.5rem; text-align: center; display: none; padding: 20px; background: rgba(0,0,0,0.8); border-radius: 10px; z-index: 31; }

        @keyframes floatGlow { 0%, 100% { transform: translateY(0); box-shadow: 0 0 50px rgba(255, 203, 5, 0.2); } 50% { transform: translateY(-10px); box-shadow: 0 0 80px rgba(255, 203, 5, 0.5); } }
        @keyframes pulseText { from { transform: scale(1); text-shadow: 0 0 10px white; } to { transform: scale(1.05); text-shadow: 0 0 30px var(--csk-yellow); } }

        @media (max-width: 600px) {
            .player-card { width: 260px; height: 380px; }
            .player-img { width: 160px; height: 200px; }
            .player-name { font-size: 1.4rem; }
            .video-wrapper { width: 90vmin; height: 90vmin; }
            .logo-container { width: 220px; height: 220px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- LAYERS -->
    <canvas id="stadium-canvas"></canvas>
    <div id="smoke-overlay"></div>

    <!-- STAGE 1: LOGO -->
    <div class="center-stage" id="logo-stage">
        <div class="logo-container">
            <img src="csk_custom.png" alt="CSK Logo" onerror="this.style.display='none'">
        </div>
        <h1>CHENNAI<br>SUPER KINGS</h1>
        <div class="tagline">WHISTLE PODU!</div>
    </div>

    <!-- STAGE 2: CARDS -->
    <div id="card-stage">
        <div class="player-card" id="active-card">
            <div class="player-role" id="card-role">ROLE</div>
            <img src="" alt="Player" class="player-img" id="card-img">
            <div class="player-name" id="card-name">PLAYER NAME</div>
        </div>
    </div>

    <!-- STAGE 3: VIDEO -->
    <div id="video-stage">
        <div class="video-wrapper">
            <video id="main-video" playsinline loop>
                <source src="video.mp4" type="video/mp4">
            </video>
            <div id="sound-icon" class="sound-overlay">🔇</div>
            <div id="error-display" class="video-error-msg">ERROR: video.mp4 not found!</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CARD_DISPLAY_TIME = 1800; 
        const TRANSITION_DELAY = 4000; // Reduced to 4s for faster testing

        // --- PLAYER DATA ---
        const players = [
            { name: "Sanju Samson", role: "🧤 WK", img: "player1.png" },
            { name: "Ayush Mhatre", role: "Batter", img: "player2.png" },
            { name: "Ruturaj Gaikwad", role: "(C) Batter", img: "player3.png" },
            { name: "Dewald Brevis", role: "Batter", img: "player4.png" },
            { name: "Sarfaraz Khan", role: "Batter", img: "player5.png" },
            { name: "Shivam Dube", role: "All-Rounder", img: "player6.png" },
            { name: "Ramakrishna Ghosh", role: "Bowler", img: "player7.png" },
            { name: "Jamie Overton", role: "✈️ All-Rounder", img: "player8.png" },
            { name: "Noor Ahmad", role: "✈️ Bowler", img: "player9.png" },
            { name: "Khaleel Ahmed", role: "Bowler", img: "player10.png" },
            { name: "Gurjapneet Singh", role: "🔄 Bowler", img: "player11.png" }
        ];

        const impactPlayers = [
            { name: "Anshul Kamboj", role: "IMPACT SUB", img: "impact1.png" },
            { name: "Urvil Patel", role: "IMPACT SUB", img: "impact2.png" }
        ];

        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('stadium-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, spectators = [], confetti = [], time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSpectators();
        }
        window.addEventListener('resize', resize);

        class Spectator {
            constructor(angle, row) {
                this.angle = angle; this.row = row;
                this.radius = 400 + (row * 30);
                this.size = Math.random() * 6 + 4;
                const colors = ['#FFCB05', '#FFD700', '#FFA500', '#FFEC8B'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update(t) { this.currentY = Math.sin(t * 0.05 + this.angle * 5 + this.row) * 10; }
            draw() {
                const centerX = width / 2, bottomY = height + 200;
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = bottomY + Math.sin(this.angle) * this.radius + this.currentY;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(x, y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Confetti {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = height + 20;
                this.vx = (Math.random() - 0.5) * 2; this.vy = -(Math.random() * 5 + 2);
                this.size = Math.random() * 8 + 2;
                this.color = Math.random() > 0.5 ? '#FFCB05' : '#001242';
            }
            update() { this.x += this.vx; this.y += this.vy; if (this.y < -20) this.reset(); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore();
            }
        }

        function initSpectators() {
            spectators = [];
            for (let r = 0; r < 20; r++) {
                for (let i = 0; i < 60; i++) {
                    spectators.push(new Spectator((Math.PI * (i/60)) + Math.random()*0.05, r));
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            const isVideo = document.getElementById('video-stage').style.display === 'block';
            ctx.fillStyle = isVideo ? 'rgba(0,0,0,0.8)' : '#000000';
            ctx.fillRect(0, 0, width, height);
            time++;
            spectators.forEach(s => { s.update(time); s.draw(); });
            if (confetti.length < 100) confetti.push(new Confetti());
            confetti.forEach(c => { c.update(); c.draw(); });
            requestAnimationFrame(animate);
        }

        // --- SEQUENCE LOGIC ---
        
        function showNextCard(list, index, isImpact) {
            if(index >= list.length) {
                if(isImpact) {
                    startVideoSequence(); // All done
                } else {
                    // Finished Main XI, start Impact
                    showNextCard(impactPlayers, 0, true);
                }
                return;
            }

            const player = list[index];
            const card = document.getElementById('active-card');
            
            // 1. Reset Position
            card.className = 'player-card'; 
            
            // 2. Update Data
            document.getElementById('card-name').innerText = player.name;
            document.getElementById('card-role').innerText = player.role;
            document.getElementById('card-img').src = player.img;
            
            let badge = card.querySelector('.impact-badge');
            if(isImpact) {
                if(!badge) { badge = document.createElement('div'); badge.className = 'impact-badge'; badge.innerText = 'IMPACT PLAYER'; card.appendChild(badge); }
                badge.style.display = 'block';
            } else {
                if(badge) badge.style.display = 'none';
            }

            // 3. Trigger Reflow (Animation Reset)
            void card.offsetWidth;

            // 4. Slide In
            card.classList.add('active');

            // 5. Wait, then Slide Out
            setTimeout(() => {
                card.classList.remove('active');
                card.classList.add('exit');
                
                // 6. Wait for exit, then Next
                setTimeout(() => {
                    showNextCard(list, index + 1, isImpact);
                }, 600); // Exit duration

            }, CARD_DISPLAY_TIME);
        }

        function startCardSequence() {
            const logoStage = document.getElementById('logo-stage');
            const cardStage = document.getElementById('card-stage');

            logoStage.style.display = 'none';
            cardStage.style.display = 'block';

            showNextCard(players, 0, false);
        }

        function startVideoSequence() {
            const cardStage = document.getElementById('card-stage');
            const videoStage = document.getElementById('video-stage');
            const video = document.getElementById('main-video');
            const smoke = document.getElementById('smoke-overlay');

            // Smoke
            smoke.classList.remove('smoke-explode');
            void smoke.offsetWidth; 
            smoke.classList.add('smoke-explode');

            setTimeout(() => {
                cardStage.style.display = 'none';
                videoStage.style.display = 'block';
                video.muted = true; 
                video.play().catch(e => console.log("Autoplay blocked"));
            }, 1000);

            setTimeout(() => { smoke.style.opacity = '0'; }, 1900);
        }

        // --- INIT ---
        window.onload = () => {
            resize();
            animate();

            // Start Timer
            setTimeout(() => {
                const smoke = document.getElementById('smoke-overlay');
                smoke.classList.add('smoke-explode');

                setTimeout(() => {
                    startCardSequence();
                }, 1000);

            }, TRANSITION_DELAY);

            // Audio Fix
            document.body.addEventListener('click', () => {
                const video = document.getElementById('main-video');
                const soundIcon = document.getElementById('sound-icon');
                if(video.paused && document.getElementById('video-stage').style.display === 'block') { video.play(); }
                if (video.muted) {
                    video.muted = false;
                    soundIcon.innerHTML = '🔊';
                    soundIcon.style.opacity = '0';
                } else {
                    video.muted = true;
                    soundIcon.innerHTML = '🔇';
                    soundIcon.style.opacity = '1';
                }
            });
        };
    </script>
</body>
</html>
